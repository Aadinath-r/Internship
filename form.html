<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="">
        <label for="fullname">Name:</label> <br>
        <input type="text" placeholder="Enter your name" id="fullname" name="fullname"><br>
    <label for="fullname">Number:</label> <br>
    <input type="number" placeholder="Enter your number"> <br>
 <!--password-->>
     <label for="psw"> Password </label><br>
     <input type="password" placeholder="" minlength="8" name="psw" id="psw"> <br>
<!--Email-->
     <label for="Email">Email address </label> <br>
     <input type="email" placeholder="Enter a valid mail id" name="email" id="name"> <br>
<!--age input-->
     <label for="age">age</label><br>
     <input type="number" id="age" name="age" min="18" max="100">
<!--radio button-->
<p>gender</p>
     <input type="radio" id="male" name="gender" value="male">
     <label for="gender"> male</label>
     <input type="radio" id="female" name="gender" value="feamale">
     <label for="gender"> female</label>
<!--checkbox-->
     <p>technologies</p>
     <input type="checkbox" name="html" id="html" value="html">
     <label for="html">HTML</label>
     <input type="checkbox" name="css" id="css" value="css">
     <label for="css">CSS</label><br>
<!--Dropdown-->
     <label for="country">Country</label>
     <select name="Country" id="country">
     <option value="India">India</option>
     <option value="USA">USA</option>
     <option value="Russia">Russia</option>
     </select><br>
<!--textarea-->
     <label for="message">message</label><br>
     <textarea name="message" id="message" >Please drop a message</textarea><br>
<!--file upload-->
     <label for="resume">Upload resume</label><br>
     <input type="file" name="resume" id="resume"><br>
<!--date picker-->
     <label for="dob">submit</label><br>
     <input type="date" name="dob" id="dob"><br>               
<!--button-->
     <button type="submit">submit</button><br>
</form>
    
</body>
</html>
